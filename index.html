<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trái Tim Ấm Áp</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <canvas id="heart"></canvas>
  
  <!-- Nút toggle luôn hiển thị -->
  <button id="toggleControlsBtn" class="toggle-fixed" title="Mở bảng điều khiển">
    ⚙️
  </button>
  
  <!-- Bảng điều khiển -->
  <div id="controls">
    <div class="control-group">
      <label>Tốc độ: <span id="speedValue">1.0</span>x</label>
      <input type="range" id="speedControl" min="0" max="2" step="0.1" value="1.0">
    </div>
    
    <div class="control-group">
      <label>Số lượng hạt: <span id="particleValue">150</span></label>
      <input type="range" id="particleControl" min="30" max="300" step="10" value="150">
    </div>
    
    <div class="control-group">
      <label>Màu sắc:</label>
      
      <!-- Color Picker tùy chỉnh -->
      <div class="color-picker-wrapper">
        <input type="color" id="customColorPicker" value="#ff1744">
        <span class="color-hex" id="colorHexValue">#ff1744</span>
        <button class="apply-color-btn" id="applyColorBtn">Áp dụng</button>
      </div>
      
      <!-- Các màu có sẵn - 2 hàng -->
      <div class="color-options">
        <!-- Hàng 1: Màu cơ bản -->
        <div class="color-row">
          <button class="color-btn active" data-color="red" style="background: #ff1744;" title="Đỏ"></button>
          <button class="color-btn" data-color="pink" style="background: #ff6b9d;" title="Hồng"></button>
          <button class="color-btn" data-color="darkPink" style="background: #d81b60;" title="Hồng đậm"></button>
          <button class="color-btn" data-color="rose" style="background: #f48fb1;" title="Hồng nhạt"></button>
          <button class="color-btn" data-color="salmon" style="background: #ff8a80;" title="Cá hồi"></button>
          <button class="color-btn" data-color="coral" style="background: #ff6b6b;" title="San hô"></button>
          <button class="color-btn" data-color="peach" style="background: #ffccbc;" title="Đào"></button>
          <button class="color-btn" data-color="orange" style="background: #ff9100;" title="Cam"></button>
          <button class="color-btn" data-color="gold" style="background: #ffd700;" title="Vàng"></button>
          <button class="color-btn" data-color="purple" style="background: #9c27b0;" title="Tím"></button>
          <button class="color-btn" data-color="darkPurple" style="background: #4a148c;" title="Tím than"></button>
          <button class="color-btn" data-color="lightBlue" style="background: #4fc3f7;" title="Xanh nhạt"></button>
          <button class="color-btn" data-color="lime" style="background: #76ff03;" title="Xanh chanh"></button>
          <button class="color-btn" data-color="mint" style="background: #69f0ae;" title="Bạc hà"></button>
        </div>
      </div>
    </div>
    
    <div class="control-group">
      <label>
        <input type="checkbox" id="textToggle" checked> Hiển thị chữ
      </label>
      <input type="text" id="textInput" value="❤ Have a good day ❤" placeholder="Nhập chữ muốn hiển thị...">
      <button id="updateTextBtn">Cập nhật</button>
    </div>
    
    <div class="control-group">
      <label>
        <input type="checkbox" id="starToggle" checked> Hiệu ứng sao băng
      </label>
    </div>
    
    <button id="hideControls">Ẩn điều khiển</button>
  </div>

  <script src="./script.js"></script>
</body>
</html>
